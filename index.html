<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirClaim Login | 中國國際航空</title>
<style>
  :root {
    --ca-red: #c8102e;
    --ca-red-dark: #97091f;
    --navy: #061a3d;
    --navy-2: #0a2a5c;
    --ink: #0f172a;
    --muted: #64748b;
    --line: rgba(226, 232, 240, .76);
    --panel: rgba(255, 255, 255, .94);
    --glass: rgba(255, 255, 255, .12);
    --shadow: 0 28px 70px rgba(2, 8, 23, .32);
    --sans: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
    --mono: "Cascadia Mono", Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    min-height: 100vh;
    font-family: var(--sans);
    color: #fff;
    background: var(--navy);
    overflow-x: hidden;
  }

  .login-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(360px, .9fr);
    position: relative;
    isolation: isolate;
  }

  .login-shell::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(110deg, rgba(6, 26, 61, .94), rgba(6, 26, 61, .74) 48%, rgba(200, 16, 46, .28)),
      url("assets/airclaim_cny_desktop.png") center right 12% / min(860px, 82vw) auto no-repeat;
    z-index: -3;
  }

  .login-shell::after {
    content: "";
    position: absolute;
    left: -10vw;
    bottom: -28vh;
    width: 82vw;
    height: 46vh;
    background: linear-gradient(12deg, var(--ca-red), var(--ca-red-dark));
    transform: skewY(-9deg);
    z-index: -2;
  }

  .brand-panel {
    padding: clamp(28px, 6vw, 72px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 100vh;
  }

  .brand-lockup {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    width: fit-content;
  }

  .brand-mark {
    width: 58px;
    height: 42px;
    border-radius: 8px;
    background: #fff;
    color: var(--ca-red);
    display: grid;
    place-items: center;
    font-weight: 800;
    letter-spacing: -.04em;
    box-shadow: 0 12px 28px rgba(0, 0, 0, .2);
  }

  .brand-name {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .brand-name strong {
    font-size: 18px;
    letter-spacing: .06em;
  }

  .brand-name span {
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(226, 232, 240, .82);
    letter-spacing: .12em;
  }

  .hero-copy {
    max-width: 680px;
    margin-top: 12vh;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 8px 11px;
    border: 1px solid rgba(255, 255, 255, .2);
    background: var(--glass);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(255, 255, 255, .86);
  }

  .signal-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 12px #10b981;
  }

  h1 {
    margin-top: 22px;
    font-size: clamp(44px, 7vw, 88px);
    line-height: .98;
    letter-spacing: 0;
    max-width: 760px;
  }

  .hero-copy p {
    margin-top: 22px;
    max-width: 600px;
    color: rgba(226, 232, 240, .82);
    font-size: clamp(15px, 1.7vw, 18px);
    line-height: 1.8;
  }

  .route-strip {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr auto;
    align-items: center;
    gap: 12px;
    max-width: 560px;
    margin-top: 34px;
    font-family: var(--mono);
    color: rgba(255, 255, 255, .9);
  }

  .airport {
    border: 1px solid rgba(255, 255, 255, .22);
    background: rgba(255, 255, 255, .1);
    border-radius: 8px;
    padding: 9px 12px;
    min-width: 72px;
    text-align: center;
  }

  .route-line {
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,.18), rgba(255,255,255,.78), rgba(255,255,255,.18));
    position: relative;
  }

  .route-line::after {
    content: "";
    position: absolute;
    right: -5px;
    top: -4px;
    width: 9px;
    height: 9px;
    border-top: 1px solid rgba(255, 255, 255, .74);
    border-right: 1px solid rgba(255, 255, 255, .74);
    transform: rotate(45deg);
  }

  .aircraft-mark {
    width: 190px;
    color: rgba(255, 255, 255, .88);
    margin-top: 52px;
    filter: drop-shadow(0 20px 30px rgba(0, 0, 0, .22));
  }

  .login-panel-wrap {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: clamp(20px, 5vw, 56px);
    background: linear-gradient(180deg, rgba(3, 12, 29, .28), rgba(3, 12, 29, .54));
    backdrop-filter: blur(10px);
  }

  .login-card {
    width: min(100%, 440px);
    background: var(--panel);
    color: var(--ink);
    border: 1px solid rgba(255, 255, 255, .78);
    border-radius: 8px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .login-card-top {
    height: 8px;
    background: linear-gradient(90deg, var(--ca-red), #f43f5e 42%, var(--navy-2));
  }

  .login-card-body {
    padding: 30px;
  }

  .login-title {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 24px;
  }

  .login-title h2 {
    font-size: 26px;
    line-height: 1.2;
    letter-spacing: 0;
  }

  .login-title p {
    margin-top: 8px;
    color: var(--muted);
    line-height: 1.6;
    font-size: 13px;
  }

  .security-badge {
    flex: 0 0 auto;
    display: grid;
    place-items: center;
    width: 42px;
    height: 42px;
    border-radius: 8px;
    background: #eff6ff;
    color: #2563eb;
    border: 1px solid #bfdbfe;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #334155;
    margin-bottom: 7px;
  }

  .field { margin-bottom: 16px; }

  .control {
    width: 100%;
    height: 46px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    background: #fff;
    padding: 0 13px;
    font: 500 14px/1 var(--sans);
    color: var(--ink);
    outline: none;
    transition: border-color .16s, box-shadow .16s;
  }

  .control:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
  }

  .password-wrap {
    position: relative;
  }

  .password-wrap .control {
    padding-right: 48px;
  }

  .toggle-password {
    position: absolute;
    right: 6px;
    top: 6px;
    width: 34px;
    height: 34px;
    border: 0;
    border-radius: 8px;
    background: #f1f5f9;
    color: #475569;
    cursor: pointer;
    display: grid;
    place-items: center;
  }

  .toggle-password:hover { background: #e2e8f0; }

  .login-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 22px;
  }

  .login-button {
    width: 100%;
    height: 46px;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    background: linear-gradient(135deg, var(--ca-red), #ef233c);
    color: #fff;
    font-weight: 800;
    letter-spacing: .03em;
    box-shadow: 0 16px 30px rgba(200, 16, 46, .24);
  }

  .login-button:hover {
    background: linear-gradient(135deg, #b60e29, var(--ca-red));
  }

  .message {
    min-height: 20px;
    margin-top: 13px;
    font-size: 12px;
    color: var(--ca-red);
    line-height: 1.6;
  }

  .panel-foot {
    padding: 14px 30px 18px;
    border-top: 1px solid var(--line);
    color: #64748b;
    font-family: var(--mono);
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  .preview-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }

  .preview-chip::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #10b981;
  }

  @media (max-width: 920px) {
    .login-shell {
      grid-template-columns: 1fr;
    }
    .brand-panel {
      min-height: auto;
      padding-bottom: 26px;
    }
    .hero-copy {
      margin-top: 56px;
    }
    .aircraft-mark {
      width: 138px;
      margin-top: 34px;
    }
    .login-panel-wrap {
      min-height: auto;
      padding-top: 0;
      background: transparent;
      backdrop-filter: none;
    }
  }

  @media (max-width: 560px) {
    .brand-panel { padding: 22px; }
    .login-panel-wrap { padding: 0 16px 28px; }
    .login-card-body { padding: 24px 20px; }
    .panel-foot { padding-inline: 20px; flex-direction: column; }
    .route-strip { grid-template-columns: auto 1fr auto; }
    .route-strip .airport:last-child,
    .route-strip .route-line:nth-of-type(2) { display: none; }
  }
</style>
</head>
<body>
<main class="login-shell">
  <section class="brand-panel" aria-label="AirClaim brand">
    <div class="brand-lockup">
      <div class="brand-mark">CA</div>
      <div class="brand-name">
        <strong>中國國際航空</strong>
        <span>AIR CHINA · TPE STATION</span>
      </div>
    </div>

    <div class="hero-copy">
      <div class="eyebrow"><span class="signal-dot"></span> WORLD TRACER CONNECTED</div>
      <h1>AirClaim</h1>
      <p>以 AI、無紙化與效率為核心，將行李理賠案件、附件、核准、匯率與稽核紀錄整合成同一條可追溯作業航線。</p>
      <div class="route-strip" aria-hidden="true">
        <div class="airport">TPE</div>
        <div class="route-line"></div>
        <div class="airport">PEK</div>
        <div class="route-line"></div>
        <div class="airport">PVG</div>
      </div>
      <svg class="aircraft-mark" viewBox="0 0 240 160" fill="none" aria-hidden="true">
        <path d="M219 74.2c10.8 5.7 10.8 21.2 0 26.9-13.4 7.1-35.4 11.8-64.9 11.8h-31.4l-46.1 39.4H52.7l21.1-43.5H35.7L17 128H0l11-40.3L0 47.4h17l18.7 19.2h38.1L52.7 23.2h23.9l46.1 39.4h31.4c29.5 0 51.5 4.7 64.9 11.6Z" fill="currentColor"/>
      </svg>
    </div>
  </section>

  <section class="login-panel-wrap">
    <form class="login-card" id="login-form" autocomplete="off">
      <div class="login-card-top"></div>
      <div class="login-card-body">
        <div class="login-title">
          <div>
            <h2>登入 AirClaim</h2>
            <p>請選擇職位，帳號密碼可任意輸入或留空，系統會依角色載入對應待辦。</p>
          </div>
          <div class="security-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
              <path d="m9 12 2 2 4-5"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label for="role">職位</label>
          <select class="control" id="role" required>
            <option value="agent">地服人員</option>
            <option value="supervisor">場站領導</option>
            <option value="finance">財務人員</option>
            <option value="auditor">稽核人員</option>
          </select>
        </div>

        <div class="field">
          <label for="account">帳號</label>
          <input class="control" id="account" name="account" type="text" placeholder="輸入10位數字">
        </div>

        <div class="field">
          <label for="password">密碼</label>
          <div class="password-wrap">
            <input class="control" id="password" name="password" type="password" placeholder="密碼">
            <button class="toggle-password" type="button" id="toggle-password" title="顯示密碼" aria-label="顯示密碼">
              <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="login-actions">
          <button class="login-button" type="submit">進入系統</button>
        </div>
        <div class="message" id="message" role="status" aria-live="polite"></div>
      </div>
      <div class="panel-foot">
        <span class="preview-chip">Secure demo session</span>
        <span>AirClaim · 2026</span>
      </div>
    </form>
  </section>
</main>

<script>
  const AUTH_KEY = 'airclaim-auth-v1';
  const ROLE_KEY = 'airclaim-current-role-v1';
  const roleLabels = {
    agent: '地服人員',
    supervisor: '場站領導',
    finance: '財務人員',
    auditor: '稽核人員'
  };

  const form = document.getElementById('login-form');
  const account = document.getElementById('account');
  const password = document.getElementById('password');
  const role = document.getElementById('role');
  const message = document.getElementById('message');
  const toggle = document.getElementById('toggle-password');

  account.focus();

  toggle.addEventListener('click', () => {
    const isHidden = password.type === 'password';
    password.type = isHidden ? 'text' : 'password';
    toggle.title = isHidden ? '隱藏密碼' : '顯示密碼';
    toggle.setAttribute('aria-label', toggle.title);
  });

  form.addEventListener('submit', (event) => {
    event.preventDefault();
    const nextRole = role.value;
    const nextAccount = account.value.trim() || 'DEMO';

    const session = {
      account: nextAccount,
      role: nextRole,
      roleLabel: roleLabels[nextRole],
      loginAt: new Date().toISOString()
    };
    sessionStorage.setItem(AUTH_KEY, JSON.stringify(session));
    localStorage.setItem(ROLE_KEY, nextRole);
    message.style.color = '#047857';
    message.textContent = `登入成功，正在進入 ${roleLabels[nextRole]} 工作台。`;
    setTimeout(() => {
      window.location.href = 'AirClaim_AI_Demo.html';
    }, 260);
  });
</script>
</body>
</html>
